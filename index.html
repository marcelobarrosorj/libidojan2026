
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Libido - Explore sem medo e sem limites</title>
    
    <!-- PWA / Manifest Support -->
    <link rel="manifest" href="metadata.json">
    <meta name="theme-color" content="#ff1493">
    
    <!-- PWA iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Libido">
    <link rel="apple-touch-icon" href="https://www.libidoapp.com.br/icon-192x192.png">

    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff1493;
            --amber: #F59E0B;
            --dark: #050505;
            --white: #ffffff;
            --danger: #ef4444;
        }

        .gradient-libido { 
            background: linear-gradient(135deg, #F59E0B 0%, #B45309 100%) !important; 
        }

        /* SEGURANÇA: Bloqueio de Seleção e Arraste */
        * {
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
            -webkit-touch-callout: none !important;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100dvh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        #root { width: 100%; display: flex; justify-content: center; min-height: 100dvh; }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            z-index: 50000;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Servidor em carregamento inicial -->
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%;">
            <div style="width: 40px; height: 40px; border: 3px solid rgba(245,158,11,0.1); border-top-color: #F59E0B; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="color: #F59E0B; font-family: sans-serif; font-size: 10px; margin-top: 20px; letter-spacing: 2px;">SINCRONIZANDO MATRIZ...</p>
        </div>
    </div>
    <script>
        window.addEventListener('error', function(e) {
            console.error('[RUNTIME_ERROR]', e.message, 'at', e.filename, ':', e.lineno);
        });
        console.log('[BOOT] HTML Carregado. Iniciando script principal...');
    </script>
    <script type="module" src="/index.tsx"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
